<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Challenge Level Questions</title>
   <link href="./output.css" rel="stylesheet">
</head>
<body>

  <!-- Question 1 -->
   <div class="bg-white p-5 rounded-xl shadow-md w-80">
    <h2 class="text-lg font-bold mb-4">Mini Shopping Cart</h2>

  
    <input id="item-name" type="text" placeholder="Item name"
      class="border w-full p-2 mb-2 rounded">

    <input id="item-price" type="number" placeholder="Price"
      class="border w-full p-2 mb-2 rounded">

    <button id="add-btn"
      class="bg-blue-600 text-white w-full py-2 rounded mb-4">
      Add Item
    </button>


    <ul id="cart-list" class="mb-4"></ul>


    <p class="font-bold">Total: ₦<span id="total">0</span></p>
  </div>
  <br>

  QUESTION PRACTICE 2
  <!-- Question 2 -->
   <div class="p-6 max-w-md ">
  <h2 class="text-xl font-bold mb-4">Notes App</h2>

  <input 
    type="text" 
    id="note-input" 
    placeholder="Write a note..."
    class="border p-2 w-full mb-3 rounded"
  >

  <button 
    id="add-butn" 
    class="bg-blue-500 text-white px-4 py-2 rounded w-full mb-4"
  >
    Add Note
  </button>

  <div id="notes-container"></div>
</div>

QUESTION PRACTICE 3
<!-- Question 3 -->
<div class="bg-white p-6 rounded-xl shadow-md w-96 text-center">
    <h2 class="text-xl font-bold mb-4">The Joey Quiz App</h2>

    <div id="question" class="mb-4 bg-purple-700 text-amber-50"></div>

    <div id="answers" class="space-y-2"></div>

    <button id="nextBtn" class="mt-4 bg-blue-500 text-white px-4 py-2 rounded">
      Next
    </button>

    <div id="result1" class="mt-4 font-bold"></div>
  </div>

  <br>

  QUESTION PRACTICE 4
  <!-- Question 4 -->
   <div class="bg-white p-6 rounded-xl shadow-md w-80 text-center">
    <h2 class="text-xl font-bold mb-4">Result Checker</h2>

    <input 
      type="number" 
      id="scoreInput" 
      placeholder="Enter your score"
      class="border w-full p-2 mb-4 rounded"
    >

    <button 
      onclick="checkResult()" 
      class="bg-blue-500 text-white px-4 py-2 rounded w-full"
    >
      Check Result
    </button>

    <p id="result2" class="mt-4 font-semibold"></p>
  </div>



  <script>
//QUESTION 1
const nameInput = document.getElementById("item-name");
const priceInput = document.getElementById("item-price");
const addBtn = document.getElementById("add-btn");
const cartList = document.getElementById("cart-list");
const totalDisplay = document.getElementById("total");

let total = 0;

addBtn.addEventListener("click", () => {
  const name = nameInput.value;
  const price = parseFloat(priceInput.value);

  if (!name || !price) return;

  // Create list item
  const li = document.createElement("li");
  li.className = "border p-2 mb-2 rounded";

  li.innerHTML = `
    ${name} - ₦${price}
    <button class="bg-red-500 text-white px-2 ml-2 rounded remove-btn">X</button>
  `;

  // Add to list
  cartList.appendChild(li);

  // Update total
  total += price;
  totalDisplay.textContent = total;

  // Clear inputs
  nameInput.value = "";
  priceInput.value = "";

  // Remove item
  li.querySelector(".remove-btn").addEventListener("click", () => {
    cartList.removeChild(li);
    total -= price;
    totalDisplay.textContent = total;
  });
});

//QUESTION 2
const input = document.getElementById("note-input");
const addButn = document.getElementById("add-butn");
const container = document.getElementById("notes-container");

const styles = ["bg-yellow-200", "bg-green-200", "bg-blue-200", "bg-pink-200"];

addButn.addEventListener("click", () => {
  const noteText = input.value;

  if (noteText === "") {
    alert("Enter a note");
    return;
  }

  const note = document.createElement("div");

  const randomStyle = styles[Math.floor(Math.random() * styles.length)];

  note.className = randomStyle + " p-3 rounded mb-2";

  const text = document.createElement("span");
  text.textContent = noteText;

  const deleteButn = document.createElement("button");
  deleteButn.textContent = "Delete";
  deleteButn.className = "ml-3 text-red-600";

  deleteButn.addEventListener("click", () => {
    note.remove();
  });

  note.appendChild(text);
  note.appendChild(deleteButn);

  container.appendChild(note);

  input.value = "";
});

//QUESTION 3
 const quiz = [
  {
    question: "Who is Joey?",
    answers: ["Fashion designer", "Entertainer", "Pilot", "Lawyer"],
    correct: 1
  },
  {
    question: "Where is he from?",
    answers: ["Abia state", "Delta state", "Rivers state", "Niger state"],
    correct: 2
  },
  {
    question: "What is the name of his female best friend?",
    answers: ["Sandra", "Cynthia", "Precious", "Victoria"],
    correct:2
  },
  {
    question: "What is his best friend's proffession?",
    answers: ["Police", "Dancer", "Stylist", "Teacher"],
    correct: 0
  }
];

let currentQuestion = 0;
let score = 0;

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const nextBtn = document.getElementById("nextBtn");
const resultEl = document.getElementById("result1");

function loadQuestion() {
  let q = quiz[currentQuestion];
  questionEl.textContent = q.question;
  answersEl.innerHTML = "";

  q.answers.forEach((answer, index) => {
    let btn = document.createElement("button");
    btn.textContent = answer;
    btn.className = "block w-full bg-gray-200 p-2 rounded";

    btn.onclick = () => {
      if (index === q.correct) {
        score++;
      }
      nextQuestion();
    };

    answersEl.appendChild(btn);
  });
}

function nextQuestion() {
  currentQuestion++;

  if (currentQuestion < quiz.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  questionEl.textContent = "";
  answersEl.innerHTML = "";
  nextBtn.style.display = "none";

  resultEl.textContent = "Your Score: " + score + "/" + quiz.length;
}

nextBtn.onclick = nextQuestion;

loadQuestion();

//QUESTION 4
  const checkResult = () => {
      const score = document.getElementById("scoreInput").value;
      const Result = document.getElementById("result2");

      if (score === "") {
        Result.textContent = "Please enter a score";
        return;
      }

      if (score < 0 || score > 100) {
        Result.textContent = "Invalid score";
      } else if (score < 50) {
        Result.textContent = "Fail";
      } else if (score < 75) {
        Result.textContent = "Pass";
      } else {
        Result.textContent = "Excellent";
      }
    };

    document.getElementById("checkBtn").addEventListener("click", checkResult);

  </script>

  
</body>
</html>
