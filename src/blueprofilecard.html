<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Card</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://unpkg.com/feather-icons"></script>

  <!-- <style>
    body { font-family: 'Poppins', sans-serif; }
  </style> -->
</head>

<body class="bg-[#f3f4f6] flex items-center justify-center min-h-screen">

  
  <div class="w-[290px] bg-white rounded-2xl shadow-[0_8px_25px_rgba(0,0,0,0.08)] overflow-hidden">

    <div class="h-[110px] bg-gradient-to-r from-[#4f7cff] to-[#3a66f7] relative flex justify-center">
      
      
      <div class="absolute top-[60px]">
        <img src="images/profile-pic.png" alt="profile pic"
          class="w-[96px] h-[96px] rounded-full border-[5px] border-white border-b-blue-500 object-cover shadow-sm">
      </div>
    </div>

  
    <div class="pt-[55px] pb-5 px-6 text-center">

  
      <h2 class="text-[16px] font-bold text-gray-800">CodingLab</h2>
      <p class="text-[12px] text-gray-900 mt-1">YouTuber & Blogger</p>

    
      <div class="flex justify-center gap-3 mt-4">
        <div class="w-8 h-8 rounded-full bg-[#4267B2] flex items-center justify-center text-white">
          <i data-feather="facebook" class="w-4 h-4"></i>
        </div>
        <div class="w-8 h-8 rounded-full bg-[#1DA1F2] flex items-center justify-center text-white">
          <i data-feather="twitter" class="w-4 h-4"></i>
        </div>
        <div class="w-8 h-8 rounded-full bg-[#E1306C] flex items-center justify-center text-white">
          <i data-feather="instagram" class="w-4 h-4"></i>
        </div>
        <div class="w-8 h-8 rounded-full bg-[#FF0000] flex items-center justify-center text-white">
          <i data-feather="youtube" class="w-4 h-4"></i>
        </div>
      </div>

      
      <div class="flex gap-3 mt-5">
        <button class="flex-1 bg-[#3a66f7] text-white text-[13px] py-2 rounded-full font-medium shadow-sm hover:opacity-90 transition">
          Subscribe
        </button>
        <button class="flex-1  bg-[#3a66f7] text-white text-[13px] py-2 rounded-full font-medium hover:bg-[#dbe3ff] transition">
          Message
        </button>
      </div>

      
      <div class="flex justify-between items-center  text-gray-900 text-[12px]">
        
        <div class="flex items-center gap-1">
          <i data-feather="heart" class="w-4 h-4"></i>
          <span >60.4k</span>
          <span class="h-5 m-3">|</span>
        </div>

        <div class="flex items-center gap-1">
          <i data-feather="message-circle" class="w-4 h-4"></i>
          <span>20k</span>
          <span class="h-5 m-3">|</span>
        </div>

        <div class="flex items-center gap-1">
          <i data-feather="share-2" class="w-4 h-4"></i>
          <span>12.4k</span>
          
        </div>

      </div>

    </div>
  </div>

  <script>
    feather.replace();
  </script>

</body>
</html>
